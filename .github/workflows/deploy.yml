# ============================================================
#  CD — build the API image, push to Amazon ECR, deploy to ECS.
#  Runs on every push to `main` (after CI passes), or manually.
#
#  This workflow SKIPS CLEANLY (green check, no error) until the AWS
#  secrets below are configured — so an un-provisioned repo stays green.
#
#  REQUIRED GitHub repo secrets (Settings → Secrets and variables → Actions):
#    AWS_ROLE_ARN   ARN of an IAM role this workflow assumes via OIDC.
#  REQUIRED repo variables (Settings → Variables):
#    AWS_REGION     e.g. us-east-1
#    ECR_REPOSITORY e.g. clouddrive-dev-api   (terraform output)
#    ECS_CLUSTER    e.g. clouddrive-dev-cluster
#    ECS_SERVICE    e.g. clouddrive-dev-api
# ============================================================
name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}   # allows manual "Run workflow" button

# Needed for GitHub OIDC -> AWS (keyless auth, the secure modern way).
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & deploy to ECS
    runs-on: ubuntu-latest
    env:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

    steps:
      # Gate: is AWS configured? If not, every later step is skipped and the
      # job still finishes successfully (green), so the repo isn't marked red.
      - name: Check AWS configuration
        id: guard
        run: |
          if [ -z "$AWS_ROLE_ARN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Deploy skipped::AWS secrets not configured — skipping build & deploy. Add AWS_ROLE_ARN to enable."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout code
        if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: steps.guard.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr
        if: steps.guard.outputs.configured == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        if: steps.guard.outputs.configured == 'true'
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -t $REGISTRY/$REPOSITORY:latest .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY:latest

      - name: Force a new ECS deployment (rolling, zero-downtime)
        if: steps.guard.outputs.configured == 'true'
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --force-new-deployment

      - name: Wait for the service to stabilise
        if: steps.guard.outputs.configured == 'true'
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --services "${{ vars.ECS_SERVICE }}"
