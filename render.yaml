# ============================================================
#  Render Blueprint — deploys CloudDrive with one click.
#
#  Creates:
#    - a free PostgreSQL database (metadata)
#    - a free web service running the FastAPI app
#
#  File bytes still live in AWS S3 (set the AWS_* vars in the Render
#  dashboard — they are marked `sync: false` so they are never committed).
#
#  How to use:
#    1. Push this repo to GitHub (done).
#    2. render.com → New → Blueprint → pick this repo.
#    3. When prompted, paste AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY.
#    4. Apply. Render builds, provisions Postgres, and gives a permanent URL.
# ============================================================

databases:
  - name: clouddrive-db
    plan: free
    databaseName: clouddrive
    user: clouddrive

services:
  - type: web
    name: clouddrive
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # Database connection string, injected from the Postgres above.
      - key: DATABASE_URL
        fromDatabase:
          name: clouddrive-db
          property: connectionString
      # Strong random secret generated by Render (never shown/committed).
      - key: SECRET_KEY
        generateValue: true
      # Storage: real AWS S3.
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_BUCKET
        value: clouddrive-066496974419
      - key: AWS_REGION
        value: us-east-1
      # Secrets — entered in the Render dashboard, NOT stored in git.
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: DEFAULT_QUOTA_MB
        value: "200"
      # PUBLIC_API_URL is auto-detected from RENDER_EXTERNAL_URL at runtime.
